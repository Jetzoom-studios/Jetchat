<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jetchat 2.0</title>

    <!-- FAVICON -->
    <link rel="icon" href="/logo.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ========================= -->
<!-- LOADING OVERLAY -->
<!-- ========================= -->
<div id="loadingOverlay" class="loading-overlay" style="display:none;">

    <div class="loading-card">

        <img
            src="/logo.png"
            alt="Jetchat Logo"
            class="loading-logo"
        >

        <h2 id="loadingTitle">
            Logging in...
        </h2>

        <div class="spinner"></div>

    </div>

</div>

<!-- ========================= -->
<!-- SETTINGS PANEL (ADDED ONLY, NOTHING REMOVED) -->
<!-- ========================= -->
<div id="settingsPanel" class="settings-panel" style="display:none;">

    <div class="settings-card">

        <h2>⚙ Settings</h2>

        <button id="closeSettings">Close</button>

        <div class="setting-item">
            <label>
                <input type="checkbox" id="darkModeToggle">
                Dark Mode
            </label>
        </div>

        <div class="setting-item">
            <label>
                <input type="checkbox" id="lightModeToggle">
                Light Mode
            </label>
        </div>

    </div>

</div>

<!-- ========================= -->
<!-- LOGIN SCREEN -->
<!-- ========================= -->
<div id="loginScreen" class="login-screen">

    <div class="login-card">

        <h1>Jetchat</h1>
        <p>Login or create an account</p>

        <input
            id="usernameInput"
            type="text"
            placeholder="Username"
            maxlength="20"
            autocomplete="off"
        >

        <input
            id="passwordInput"
            type="password"
            placeholder="Password"
            maxlength="30"
            autocomplete="off"
        >

        <button id="loginButton">Login</button>
        <button id="signupButton">Sign Up</button>

    </div>

</div>

<!-- ========================= -->
<!-- CHAT APP -->
<!-- ========================= -->
<div id="app" class="app" style="display:none;">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            <h1>Jetchat</h1>
        </div>

        <div class="online-section">

            <div class="online-title">
                <span class="dot"></span>
                Online
            </div>

            <div id="onlineUsers"></div>

        </div>

    </aside>

    <!-- ========================= -->
    <!-- MAIN -->
    <!-- ========================= -->
    <main class="main">

        <!-- Top Bar -->
        <header class="topbar">

            <div class="chat-title">
                <h2>Global Chat</h2>
                <span id="onlineCount">• 0 online</span>
            </div>

            <button id="settingsBtn">⚙</button>

        </header>

        <!-- ========================= -->
        <!-- CHAT -->
        <!-- ========================= -->
        <div id="chatContainer">

            <div id="messages">

                <div class="system-wrapper">
                    <div class="system-message">
                        👋 Welcome to Jetchat!
                    </div>
                </div>

            </div>

        </div>

        <!-- ========================= -->
        <!-- TYPING INDICATOR -->
        <!-- ========================= -->
        <div id="typingIndicator" class="typing-indicator"></div>

        <!-- ========================= -->
        <!-- REPLY PREVIEW -->
        <!-- ========================= -->
        <div
            id="replyPreview"
            class="reply-preview"
            style="display:none;"
        >

            <div class="reply-info">

                <div class="reply-title">
                    ↩ Replying to
                    <span id="replyUsername"></span>
                </div>

                <div
                    id="replyMessage"
                    class="reply-message"
                ></div>

            </div>

            <button id="cancelReply" type="button">✕</button>

        </div>

        <!-- ========================= -->
        <!-- CHAT INPUT -->
        <!-- ========================= -->
        <form id="chatForm">

            <button type="button" id="emojiButton">😊</button>

            <input
                id="messageInput"
                type="text"
                placeholder="Type a message..."
                autocomplete="off"
            >

            <button id="sendButton" type="submit">Send</button>

            <!-- EMOJI PICKER -->
            <div class="emoji-picker" id="emojiPicker">

                <span>😀</span>
                <span>😁</span>
                <span>😂</span>
                <span>🤣</span>
                <span>😊</span>
                <span>😍</span>
                <span>🥰</span>
                <span>😎</span>
                <span>😭</span>
                <span>😡</span>
                <span>🤔</span>
                <span>👍</span>
                <span>👎</span>
                <span>👏</span>
                <span>🙌</span>
                <span>🔥</span>
                <span>💯</span>
                <span>🎉</span>
                <span>❤️</span>
                <span>💙</span>
                <span>💀</span>
                <span>✨</span>
                <span>🚀</span>

            </div>

        </form>

    </main>

</div>

<!-- ========================= -->
<!-- PROFILE MODAL -->
<!-- ========================= -->
<div id="profileModal" class="profile-modal" style="display:none;">

    <div class="profile-card">

        <button id="closeProfile" class="close-profile">✕</button>

        <div class="profile-banner"></div>

        <div class="profile-avatar">
            <img
                id="profileAvatar"
                src="/default-avatar.png"
                alt="Avatar"
            >
        </div>

        <h2 id="profileUsername">Username</h2>

        <p id="profileBio">
            No bio yet.
        </p>

        <div class="profile-info">

            <div>
                <strong>Joined</strong><br>
                <span id="profileJoinDate">Unknown</span>
            </div>

        </div>

        <button id="editProfileBtn">
            Edit Profile
        </button>

    </div>

</div>    
    
<!-- Socket.IO -->
<script src="/socket.io/socket.io.js"></script>

<!-- Jetchat -->
<script src="script.js"></script>

</body>
</html>
